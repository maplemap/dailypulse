services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthbot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: healthbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthbot -d healthbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://healthbot:${DB_PASSWORD:-password}@db:5432/healthbot
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    env_file:
      - .env

volumes:
  postgres_data:
